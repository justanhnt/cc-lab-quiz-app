<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Arena</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <header class="app__header">
      <h1 class="app__title">Quiz Arena</h1>
    </header>

    <main class="app__main">

      <!-- Start Screen -->
      <section id="start-screen" class="screen">
        <div class="start">
          <h2 class="start__heading">Ready to test your knowledge?</h2>
          <div class="start__category">
            <label for="category-select" class="start__label">Choose a category</label>
            <select id="category-select" class="start__select"></select>
          </div>
          <button id="btn-start" class="btn btn--primary">Start Quiz</button>
          <button id="btn-leaderboard" class="btn btn--secondary">View Leaderboard</button>
        </div>
      </section>

      <!-- Quiz Screen -->
      <section id="quiz-screen" class="screen">
        <div class="quiz">
          <div class="quiz__header">
            <span id="quiz-question-num" class="quiz__num"></span>
            <span id="quiz-category-badge" class="quiz__badge"></span>
            <span id="quiz-score" class="quiz__score"></span>
          </div>

          <div class="quiz__progress">
            <div id="quiz-progress-fill" class="quiz__progress-fill"></div>
          </div>

          <div class="timer">
            <div class="timer__bar">
              <div id="timer-bar-fill" class="timer__bar-fill"></div>
            </div>
            <span id="timer-text" class="timer__text">15s</span>
          </div>

          <p id="quiz-question-text" class="quiz__question"></p>
          <span id="quiz-streak" class="quiz__streak"></span>

          <div id="quiz-options" class="quiz__options"></div>
        </div>
      </section>

      <!-- Results Screen -->
      <section id="results-screen" class="screen">
        <div class="results">
          <h2 class="results__heading">Game Over!</h2>
          <div class="results__stats">
            <div class="results__stat">
              <span class="results__label">Score</span>
              <span id="results-score" class="results__value results__value--score"></span>
            </div>
            <div class="results__stat">
              <span class="results__label">Correct</span>
              <span id="results-correct" class="results__value"></span>
            </div>
            <div class="results__stat">
              <span class="results__label">Accuracy</span>
              <span id="results-accuracy" class="results__value"></span>
            </div>
            <div class="results__stat">
              <span class="results__label">Time</span>
              <span id="results-time" class="results__value"></span>
            </div>
            <div class="results__stat">
              <span class="results__label">Best Streak</span>
              <span id="results-streak" class="results__value"></span>
            </div>
          </div>
          <div class="results__save">
            <input id="player-name" type="text" placeholder="Enter your name" class="results__input" maxlength="20">
            <button id="btn-save-score" class="btn btn--primary">Save Score</button>
          </div>
          <div class="results__actions">
            <button id="btn-play-again" class="btn btn--secondary">Play Again</button>
            <button id="btn-view-leaderboard" class="btn btn--secondary">Leaderboard</button>
          </div>
        </div>
      </section>

      <!-- Leaderboard Screen -->
      <section id="leaderboard-screen" class="screen">
        <div class="leaderboard">
          <h2 class="leaderboard__heading">Leaderboard</h2>
          <table class="leaderboard__table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Score</th>
                <th>Accuracy</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
          </table>
          <button id="btn-back-start" class="btn btn--primary">Back to Start</button>
        </div>
      </section>

    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
